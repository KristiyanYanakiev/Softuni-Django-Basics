    <form method="post">
        {% csrf_token %}

        <!-- Show validation errors -->
        {{ form.non_field_errors }}

        <!-- Name field -->
        <label for="id_name">Department Name</label>
        {{ form.name.errors }}
        {{ form.name }}

        <!-- Description field -->
        <label for="id_description">Description</label>
        {{ form.description.errors }}
        {{ form.description }}

        <button type="submit">Update Department</button>
    </form>
